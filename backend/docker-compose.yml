services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spheredb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
     context: .
     dockerfile: Sphere.Api/Dockerfile
    depends_on:
      - postgres
      - search-engine
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=spheredb;Username=postgres;Password=password
      - FILE_STORAGE_PATH=/app/uploads
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
  
  search-engine:
    build:
      context: ./services/SearchEngine
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    volumes:
      - search_data:/app/search-data
    restart: unless-stopped

  background-remover:
    build:
      context: ./services/background-remover
      dockerfile: Dockerfile
    command: "api --port 5002"
    ports:
      - "5002:5002"
    volumes:
      - remover_data:/app/remover-data
    restart: unless-stopped
volumes:
  postgres_data:
  uploads_data:
  search_data:
  remover_data: